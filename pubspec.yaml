name: entity_mapper
description: Lightweight code generator for Clean Architecture focused projects. Automatically creates type-safe Entity ↔ Model mapping methods with dart_mappable-style patterns.
version: 0.5.0
homepage: https://github.com/r2am9d/entity_mapper
repository: https://github.com/r2am9d/entity_mapper
documentation: https://github.com/r2am9d/entity_mapper#readme
topics:
  - clean-architecture
  - entity-mapping
  - code-generation
  - domain-driven-design
  - dart

environment:
  sdk: ^3.11.0

dependencies:
  analyzer: ">=10.0.0 <14.0.0"
  build: ">=3.0.0 <5.0.0"
  source_gen: ">=3.1.0 <5.0.0"

dev_dependencies:
  build_runner: ^2.4.13
  test: ^1.25.0
  very_good_analysis: ^10.2.0
